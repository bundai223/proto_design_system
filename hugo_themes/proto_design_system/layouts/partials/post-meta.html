<div class="post-meta">
  {{ with .Date }}
    <time datetime="{{ .Format "2006-01-02T15:04:05Z07:00" }}">{{ .Format "2006-01-02" }}</time>
  {{ end }}
  {{ if gt .ReadingTime 0 }}
    <span>{{ .ReadingTime }} min read</span>
  {{ end }}
  {{ with .Section }}
    <span>{{ . | humanize }}</span>
  {{ end }}
</div>
